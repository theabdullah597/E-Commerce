<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product - Capstone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    #toast{ position: fixed; bottom: 18px; right: 18px; z-index: 9999; opacity:0; transform: translateY(10px); transition: all .2s ease; }
    #toast.show{ opacity:1; transform: translateY(0); }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Shop<span class="text-warning">Capstone</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="cart.html">Cart</a></li>
        </ul>
        <a href="cart.html" class="btn btn-dark position-relative">
          <i class="bi bi-cart"></i>
          <span class="ms-1">Cart</span>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark" id="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div id="product-error" class="mb-3"></div>
    <div id="product-container"></div>
    <div class="mt-4">
      <a href="shop.html" class="btn btn-outline-dark"><i class="bi bi-arrow-left"></i> Back to Shop</a>
    </div>
  </main>

  <div id="toast" class="toast align-items-center text-white bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg">Toast</div>
    </div>
  </div>

  <footer class="border-top bg-white">
    <div class="container py-3 text-muted small d-flex justify-content-center">
      © <span id="year"></span> ShopCapstone
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/product.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
