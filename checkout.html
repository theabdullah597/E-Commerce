<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout - Capstone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    .form-error{ display:none; color:#dc3545; font-size: 13px; }
    .is-invalid + .form-error{ display:block; }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Shop<span class="text-warning">Capstone</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        </ul>
        <a href="cart.html" class="btn btn-dark position-relative">
          <i class="bi bi-cart"></i>
          <span class="ms-1">Cart</span>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark" id="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h2 class="h4 mb-3">Checkout</h2>

    <div class="row g-4">
      <div class="col-12 col-lg-7">
        <div class="bg-white border rounded-4 p-4 shadow-sm">
          <form id="checkout-form" novalidate>
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label" for="checkout-name">Full Name</label>
                <input id="checkout-name" class="form-control" type="text" placeholder="John Doe">
                <div class="form-error" id="checkout-name-error">Name is required.</div>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label" for="checkout-email">Email</label>
                <input id="checkout-email" class="form-control" type="email" placeholder="john@example.com">
                <div class="form-error" id="checkout-email-error">Enter a valid email.</div>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label" for="checkout-phone">Phone</label>
                <input id="checkout-phone" class="form-control" type="text" placeholder="1234567890">
                <div class="form-error" id="checkout-phone-error">Phone is required.</div>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label" for="checkout-city">City</label>
                <input id="checkout-city" class="form-control" type="text" placeholder="New York">
                <div class="form-error" id="checkout-city-error">City is required.</div>
              </div>
              <div class="col-12">
                <label class="form-label" for="checkout-address">Address</label>
                <input id="checkout-address" class="form-control" type="text" placeholder="Street address">
                <div class="form-error" id="checkout-address-error">Address is required.</div>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label" for="checkout-postal">Postal Code</label>
                <input id="checkout-postal" class="form-control" type="text" placeholder="e.g. 12345">
                <div class="form-error" id="checkout-postal-error">Postal code looks invalid.</div>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Payment Method (UI only)</label>
                <div class="d-flex flex-column gap-2">
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment-method" id="pm-card" value="card">
                    <label class="form-check-label" for="pm-card">Credit Card</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment-method" id="pm-cod" value="cod">
                    <label class="form-check-label" for="pm-cod">Cash on Delivery</label>
                  </div>
                </div>
                <div class="form-error" id="payment-method-error">Select a payment method.</div>
              </div>
            </div>

            <div class="mt-4 d-flex gap-2 flex-wrap">
              <button id="checkout-submit-btn" type="submit" class="btn btn-dark flex-fill"><i class="bi bi-lock"></i> Place Order</button>
              <a class="btn btn-outline-dark" href="cart.html">Back to Cart</a>
            </div>
          </form>

          <div id="checkout-success" class="mt-3"></div>
        </div>
      </div>

      <div class="col-12 col-lg-5">
        <div class="bg-white border rounded-4 p-4 shadow-sm">
          <h3 class="h5 mb-3">Order Summary</h3>
          <div id="order-summary"></div>
        </div>
      </div>
    </div>

  </main>

  <footer class="border-top bg-white">
    <div class="container py-3 text-muted small d-flex justify-content-center">
      © <span id="year"></span> ShopCapstone
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/checkout.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const badge = document.getElementById('cart-badge');
    if (badge) badge.textContent = String(window.CART.getCartCount());
    window.addEventListener('cart:changed', () => badge.textContent = String(window.CART.getCartCount()));
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
