<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart - Capstone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    #toast{ position: fixed; bottom: 18px; right: 18px; z-index: 9999; opacity:0; transform: translateY(10px); transition: all .2s ease; }
    #toast.show{ opacity:1; transform: translateY(0); }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Shop<span class="text-warning">Capstone</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="cart.html">Cart</a></li>
        </ul>
        <a href="cart.html" class="btn btn-dark position-relative">
          <i class="bi bi-cart"></i>
          <span class="ms-1">Cart</span>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark" id="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
      <h2 class="h4 mb-0">Your Cart</h2>
      <button class="btn btn-outline-danger" id="clear-cart-btn" type="button">Clear Cart</button>
    </div>

    <div class="table-responsive mt-3 bg-white rounded-4 border shadow-sm">
      <table class="table align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Product</th>
            <th class="text-nowrap">Unit Price</th>
            <th class="text-nowrap">Quantity</th>
            <th class="text-nowrap">Line Total</th>
            <th class="text-nowrap">Action</th>
          </tr>
        </thead>
        <tbody id="cart-body"></tbody>
      </table>
    </div>

    <div class="row g-3 mt-3">
      <div class="col-12 col-lg-8"></div>
      <div class="col-12 col-lg-4">
        <div class="bg-white border rounded-4 p-3 shadow-sm">
          <div class="d-flex justify-content-between">
            <span class="text-muted">Items</span>
            <span class="fw-semibold" id="cart-item-count">0</span>
          </div>
          <div class="d-flex justify-content-between mt-2">
            <span class="text-muted">Subtotal</span>
            <span class="fw-semibold" id="cart-subtotal">$0.00</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between">
            <span class="fw-semibold">Total</span>
            <span class="fw-bold" id="cart-total">$0.00</span>
          </div>
          <div class="d-flex gap-2 mt-3">
            <a href="shop.html" class="btn btn-outline-dark flex-fill">Continue Shopping</a>
            <a href="checkout.html" class="btn btn-dark flex-fill">Checkout</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast align-items-center text-white bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg">Toast</div>
    </div>
  </div>

  <footer class="border-top bg-white">
    <div class="container py-3 text-muted small d-flex justify-content-center">
      © <span id="year"></span> ShopCapstone
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/cart-page.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    document.getElementById('clear-cart-btn')?.addEventListener('click', () => {
      window.CART.clearCart();
      window.dispatchEvent(new Event('cart:changed'));
      // rerender
      const tbody = document.getElementById('cart-body');
      if (tbody) tbody.innerHTML = '';
      // cart-page.js will rerender because it listens on DOMContent; for immediate, reload:
      window.location.reload();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
